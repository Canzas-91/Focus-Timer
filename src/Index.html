<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Focus Timer</title>
    <link rel="stylesheet" href="./style/index.css">
</head>
<body>
    <main class="timer" id="timer">
        <div class="timer__time-period" id="time-period">
            <p class="timer__mode" id="mode">Work</p>
            <h1 class="timer__time" id="time">25:00</h1>
        </div>
        <div class="timer__settings" id="settings">
            <div class="timer__music-volume" id="music-volume">
                <div class="timer__music" id="music">
                    <p class="timer__music-name" id="music-name">Relaxing Music</p>
                </div>
                <div class="timer__volume" id="volume-container">
                    <input type="range" id="volume" name="volume" min="0" max="100">
                    <img src="./assets/icon-volume.svg" alt="Volume">
                </div>
            </div>
            <div class="timer__management" id="management">
                <button class="timer__start" id="back"><img src="./assets/icon-back.svg" alt="Back"></button>
                <button class="timer__stop" id="stop"><img src="./assets/icon-pause.svg" alt="Stop" id="stop-icon"></button>
                <button class="timer__reset" id="next"><img src="./assets/icon-next.svg" alt="Next"></button>
            </div>
        </div>
    </main>
    <script src="./index.js" type="module"></script>
</body>
</html>
