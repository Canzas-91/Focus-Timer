<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Focus Timer</title>
</head>
<body>
    <main class="timer" id="timer">
        <div class="timer__time-period" id="time-period">
            <p class="timer__mode" id="mode">work</p>
            <h1 class="timer__time" id="time">25:00</h1>
        </div>
        <div class="timer__management" id="management">
                <button class="timer__start" id="start"><img src="start-icon.png" alt="Start"></button>
                <button class="timer__stop" id="stop"><img src="stop-icon.png" alt="Stop"></button>
                <button class="timer__reset" id="reset"><img src="reset-icon.png" alt="Reset"></button>
        </div>
        <div class="timer__music-volume" id="music-volume">
            <div class="timer__music" id="music">
                <p class="timer__music-name" id="music-name">Relaxing Music</p>
            </div>
            <div class="timer__volume" id="volume-container">
                <label for="volume" id="volume-label">Volume:</label>
                <input type="range" id="volume" name="volume" min="0" max="100">
            </div>
        </div>
    </main>
    ≠
</body>
</html>
